name: Build and Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_steam:
        description: "Publish to Steam"
        required: false
        default: true
        type: boolean

env:
  GODOT_VERSION: 4.6
  ITCH_USER: 2bytesgoat
  ITCH_GAME: dragon-jump

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag for build description
        id: meta
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=dev-$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT
          fi

      - name: Inject runtime secrets
        run: |
          cat > src/scripts/singletons/runtime_secrets.gd <<EOF
          extends Node
          const is_set = true
          const SILENT_WOLF_API_KEY = "${{ secrets.SILENT_WOLF_API_KEY }}"
          const SILENT_WOLF_GAME_ID = "${{ secrets.SILENT_WOLF_GAME_ID }}"
          EOF

      - name: Download Godot Engine (Linux Headless)
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          unzip -q Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          mv Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 godot
          chmod +x godot

      - name: Install Official Export Templates (For Web)
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          unzip -q Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          rm Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz

      - name: Inject Custom Windows Templates
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download custom-templates -p "windows.zip"

          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable"
          mkdir -p "$TEMPLATE_DIR"

          unzip -o -q windows.zip -d /tmp/windows_templates

          mv /tmp/windows_templates/godot.windows.template_release.x86_64.exe \
            "$TEMPLATE_DIR/windows_release_x86_64.exe"

          cp "$TEMPLATE_DIR/windows_release_x86_64.exe" \
            "$TEMPLATE_DIR/windows_debug_x86_64.exe"

          rm -rf /tmp/windows_templates windows.zip

      - name: Export game (Web)
        run: |
          mkdir -p build/web
          ./godot --headless --path . --export-release "Web" build/web/index.html

      - name: Export game (Windows)
        env:
          GODOT_SCRIPT_ENCRYPTION_KEY: ${{ secrets.GODOT_PCK_ENCRYPTION_KEY }}
        run: |
          mkdir -p build/windows
          ./godot --headless --path . --export-release "Windows Desktop" build/windows/${{ secrets.EXPORT_NAME }}.exe

      - name: Export game (Linux)
        run: |
          mkdir -p build/linux
          ./godot --headless --path . --export-release "Linux Desktop" build/linux/${{ secrets.EXPORT_NAME }}.x86_64

      - name: Create MacOS depot placeholder
        run: |
          mkdir -p build/macos
          echo "MacOS build is no longer supported." > build/macos/macos_not_supported.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/

  publish-itch:
    name: Publish to itch.io
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build/

      - name: Restore itch upload cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/itch
          key: itch-hashes-v1

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          wget -q https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default -O butler.zip
          unzip -q butler.zip
          chmod +x butler

          hash_dir() { find "$1" -type f -exec sha256sum {} \; | sort | sha256sum | cut -d' ' -f1; }
          web_hash=$(hash_dir build/web)
          win_hash=$(hash_dir build/windows)
          linux_hash=$(hash_dir build/linux)

          push_channel() {
            local channel=$1
            local dir=$2
            local curr_hash=$3
            local prev_hash=$4
            if [[ "$curr_hash" == "$prev_hash" ]]; then
              echo "Skipping $channel (content unchanged)"
              return 0
            fi
            for i in 1 2 3 4 5; do
              if ./butler push "$dir" ${{ env.ITCH_USER }}/${{ env.ITCH_GAME }}:$channel; then
                return 0
              fi
              if [[ $i -lt 5 ]]; then
                echo "itch.io may still be processing previous build, retrying in 30s..."
                sleep 30
              fi
            done
            return 1
          }

          prev_web="" prev_win="" prev_linux=""
          [[ -f .cache/itch/hashes.txt ]] && . .cache/itch/hashes.txt

          push_channel web build/web "$web_hash" "$prev_web" || exit 1
          push_channel windows build/windows "$win_hash" "$prev_win" || exit 1
          push_channel linux build/linux "$linux_hash" "$prev_linux" || exit 1

          mkdir -p .cache/itch
          echo "prev_web=$web_hash" > .cache/itch/hashes.txt
          echo "prev_win=$win_hash" >> .cache/itch/hashes.txt
          echo "prev_linux=$linux_hash" >> .cache/itch/hashes.txt

      - name: Save itch upload cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .cache/itch
          key: itch-hashes-v1

  publish-steam:
    name: Publish to Steam
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.publish_steam != 'false'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build/

      - name: Push to Steam
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: ${{ secrets.STEAM_APP_ID }}
          buildDescription: ${{ needs.build.outputs.tag }}
          rootPath: build
          depot1Path: windows   # STEAM_APP_ID + 1
          depot2Path: macos     # STEAM_APP_ID + 2 (placeholder, no longer supported)
          depot3Path: linux     # STEAM_APP_ID + 3
          releaseBranch: prerelease
